name: deploy-web

# Push to main that touches apps/web/ → build & deploy her body to monet.sprited.ai.

on:
  push:
    branches: [main]
    paths: ['apps/web/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # The web build never needs Electron; skip apps/desktop's ~100MB binary download.
      ELECTRON_SKIP_BINARY_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v5
        with:
          # Cone-mode sparse checkout: both apps (tiny without contents/) + root files
          # (package.json, package-lock.json) so the npm workspace resolves.
          sparse-checkout: apps
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build -w @monet/web
      - run: npm exec -w @monet/web -- wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
