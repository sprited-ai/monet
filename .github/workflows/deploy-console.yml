name: deploy-console

# Push to main that touches console/ → build & deploy to console.monet.sprited.ai.
# Runtime secrets (CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET) are set once via
# `wrangler secret put` and persist across deploys — they are NOT in this workflow.

on:
  push:
    branches: [main]
    paths: ['console/**']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: console
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: console/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
